services:
  postgres:
    image: postgres:17
    container_name: habi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    volumes:
      - habi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: habi-backend
    env_file:
      - .env
    environment:
      HABI_DATABASE_URL: ${HABI_DATABASE_URL:?HABI_DATABASE_URL is required}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:?BACKEND_PORT is required}:8000"
    volumes:
      - ./backend:/app/backend
    command:
      [
        "sh",
        "-c",
        "alembic -c backend/alembic.ini upgrade head && uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload"
      ]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: habi-frontend
    env_file:
      - .env
    environment:
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:?VITE_API_PROXY_TARGET is required}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:?FRONTEND_PORT is required}:5173"
    volumes:
      - ./frontend:/app/frontend
      - habi_frontend_node_modules:/app/frontend/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  habi_postgres_data:
  habi_frontend_node_modules:
